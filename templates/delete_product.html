{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="fas fa-trash me-2"></i>E'lonni o'chirish</h4>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">Rostdan ham <strong>"{{ product.title }}"</strong> e'lonini o'chirmoqchimisiz?</p>
                <p class="text-muted">Bu amalni ortga qaytarib bo'lmaydi.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-5">Ha, o'chirish</button>
                    <a href="{% url 'my_products' %}" class="btn btn-secondary px-5">Bekor qilish</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
