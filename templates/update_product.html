{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-warning">
                <h4 class="mb-0"><i class="fas fa-edit me-2"></i>E'lonni tahrirlash</h4>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <h5>Rasmlar</h5>
                    {{ formset.management_form }}
                    <div class="row">
                        {% for f in formset %}
                        <div class="col-md-4 mb-3">
                            {{ f.as_p }}
                        </div>
                        {% endfor %}
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Saqlash</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
