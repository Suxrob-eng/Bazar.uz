{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-warning">
                <h4 class="mb-0"><i class="fas fa-shield-alt me-2"></i>Captcha tasdiqlash</h4>
                <p class="mb-0 small">4/4: Oxirgi qadam</p>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
                <h5>Telefon va email tasdiqlandi!</h5>
                <p class="text-muted">Endi captcha kodini kiriting</p>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.captcha }}
                    </div>
                    
                    <button type="submit" class="btn btn-warning w-100 py-3">
                        <i class="fas fa-check me-2"></i>Yakunlash
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
