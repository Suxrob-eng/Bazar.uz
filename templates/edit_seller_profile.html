{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-header bg-warning text-white text-center py-3 rounded-top-4">
                <h3 class="mb-0"><i class="fas fa-edit me-2"></i>Sotuvchi profilini tahrirlash</h3>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">F.I.O.</label>
                            {{ form.full_name }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Telefon</label>
                            {{ form.phone }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Qo'shimcha telefon</label>
                            {{ form.additional_phone }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Shahar/Tuman</label>
                            {{ form.city }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Viloyat</label>
                            {{ form.region }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Rasm</label>
                            {{ form.avatar }}
                            {% if seller.avatar %}
                                <div class="mt-2">
                                    <img src="{{ seller.avatar.url }}" width="80" height="80" class="rounded-circle border">
                                </div>
                            {% endif %}
                        </div>
                    </div>
                    
                    <hr>
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'seller_profile' seller.id %}" class="btn btn-outline-secondary">Orqaga</a>
                        <button type="submit" class="btn btn-warning">Yangilash</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
